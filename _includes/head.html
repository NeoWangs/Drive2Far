<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: page.title | default: site.description | default: site.title | strip_html | escape }}">
<link rel="icon" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}" sizes="32x32">
<link rel="icon" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}" sizes="16x16">
<link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
{% if site.heibai.mathjax %}
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}
<script>
(function () {
  try {
    var saved = localStorage.getItem('heibai-theme');
    var mode = saved || '{{ site.heibai.default_theme | default: "light" }}';
    document.documentElement.setAttribute('data-theme', mode);
  } catch (e) {}
})();
</script>
